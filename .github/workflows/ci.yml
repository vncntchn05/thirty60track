name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel any in-progress run on the same branch when a new commit is pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Lint & type-check ─────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

  # ─── Job 2: Unit tests ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:ci

      - name: Collect coverage report
        run: npm run test:coverage
        continue-on-error: true   # coverage check is advisory in CI for now

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── Job 3: Integration tests ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create test auth users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_TRAINER_PASSWORD: ${{ secrets.TEST_TRAINER_PASSWORD }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: |
          chmod +x scripts/create-test-users.sh
          ./scripts/create-test-users.sh

      - name: Seed test database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # GitHub Actions runners lack IPv6 — resolve hostname to IPv4 first
          DB_HOST=$(echo "$SUPABASE_DB_URL" | sed -E 's|.*@([^:/]+).*|\1|')
          DB_IPV4=$(getent ahosts "$DB_HOST" | awk '/STREAM/ && /[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/ {print $1; exit}')
          echo "Resolved $DB_HOST → $DB_IPV4"
          PGHOSTADDR="$DB_IPV4" psql "$SUPABASE_DB_URL" -f supabase/seed.sql
          PGHOSTADDR="$DB_IPV4" psql "$SUPABASE_DB_URL" -f supabase/seed_cicd.sql

      - name: Run integration tests
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Emails are not sensitive — hardcoded to match create-test-users.sh
          TEST_TRAINER_EMAIL: trainer@thirty60test.dev
          TEST_TRAINER_PASSWORD: ${{ secrets.TEST_TRAINER_PASSWORD }}
          TEST_CLIENT_EMAIL: client@thirty60test.dev
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
          # Fixed UUID from seed_cicd.sql — Jordan Reyes's client row
          TEST_CLIENT_ID: cccccccc-0000-4000-c000-000000000003
        run: npm run test:integration

  # ─── Job 4: Web build smoke-test ──────────────────────────────────────────
  build-check:
    name: Expo Web Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Expo web export (smoke test)
        run: npx expo export --platform web
        env:
          CI: true

  # ─── Job 5: Final gate ────────────────────────────────────────────────────
  ci-status:
    name: CI Status Gate
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, integration-tests, build-check]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" ||
                "${{ needs.unit-tests.result }}"        != "success" ||
                "${{ needs.integration-tests.result }}" != "success" ||
                "${{ needs.build-check.result }}"       != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
