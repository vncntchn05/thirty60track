name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test auth users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_TRAINER_PASSWORD: ${{ secrets.TEST_TRAINER_PASSWORD }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: |
          chmod +x scripts/create-test-users.sh
          ./scripts/create-test-users.sh

      - name: Seed test database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -f supabase/seed.sql
          psql "$SUPABASE_DB_URL" -f supabase/seed_cicd.sql

      - name: Verify auth credentials (debug)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_TRAINER_PASSWORD: ${{ secrets.TEST_TRAINER_PASSWORD }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: |
          echo "→ Verifying trainer sign-in..."
          TRAINER_AUTH=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/auth/v1/token?grant_type=password" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"trainer@thirty60test.dev\",\"password\":\"${TEST_TRAINER_PASSWORD}\"}")
          TRAINER_AUTH_HTTP=$(echo "$TRAINER_AUTH" | tail -1)
          echo "  Trainer auth HTTP: $TRAINER_AUTH_HTTP"
          echo "→ Verifying client sign-in..."
          CLIENT_AUTH=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/auth/v1/token?grant_type=password" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"client@thirty60test.dev\",\"password\":\"${TEST_CLIENT_PASSWORD}\"}")
          CLIENT_AUTH_HTTP=$(echo "$CLIENT_AUTH" | tail -1)
          CLIENT_AUTH_BODY=$(echo "$CLIENT_AUTH" | head -n -1)
          echo "  Client auth HTTP: $CLIENT_AUTH_HTTP"
          if [[ "$CLIENT_AUTH_HTTP" -lt 200 || "$CLIENT_AUTH_HTTP" -ge 300 ]]; then
            echo "  Client auth body: $CLIENT_AUTH_BODY"
            echo "ERROR: Client sign-in failed — check TEST_CLIENT_PASSWORD secret" >&2
            exit 1
          fi

      - name: Run integration tests
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Emails are not sensitive — hardcoded to match create-test-users.sh
          TEST_TRAINER_EMAIL: trainer@thirty60test.dev
          TEST_TRAINER_PASSWORD: ${{ secrets.TEST_TRAINER_PASSWORD }}
          TEST_CLIENT_EMAIL: client@thirty60test.dev
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
          # Fixed UUID from seed_cicd.sql — Jordan Reyes's client row
          TEST_CLIENT_ID: cccccccc-0000-4000-c000-000000000003
        run: npm run test:integration
