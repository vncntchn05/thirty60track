name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test auth users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_TRAINER_PASSWORD: ${{ secrets.TEST_TRAINER_PASSWORD }}
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
        run: |
          chmod +x scripts/create-test-users.sh
          ./scripts/create-test-users.sh

      - name: Seed test database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -f supabase/seed.sql
          psql "$SUPABASE_DB_URL" -f supabase/seed_cicd.sql

      - name: Run integration tests
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          # Emails are not sensitive — hardcoded to match create-test-users.sh
          TEST_TRAINER_EMAIL: trainer@thirty60test.dev
          TEST_TRAINER_PASSWORD: ${{ secrets.TEST_TRAINER_PASSWORD }}
          TEST_CLIENT_EMAIL: client@thirty60test.dev
          TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
          # Fixed UUID from seed_cicd.sql — Jordan Reyes's client row
          TEST_CLIENT_ID: cccccccc-0000-4000-c000-000000000003
        run: npm run test:integration
